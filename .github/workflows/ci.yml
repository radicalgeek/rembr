name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rembr-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rembr-mcp/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=moderate

  vscode:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rembr-vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rembr-vscode/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=moderate
